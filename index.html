<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EL TIGRE — King of the Jungle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --jungle:#0f5132; --jungle-deep:#063122; --gold:#e3a52b; --blood:#b8341f;
    --bone:#efe7d2; --ink:#120e08; --orange:#ee7b1e; --rot:0;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Archivo',system-ui,sans-serif;color:var(--bone);
    background:var(--ink);overflow:hidden;
    display:flex;justify-content:center;align-items:stretch;
  }
  #app{
    position:relative;width:100%;max-width:520px;height:100dvh;
    display:flex;flex-direction:column;
    background:
      radial-gradient(120% 90% at 50% -10%, rgba(227,165,43,.18), transparent 55%),
      linear-gradient(180deg,
        color-mix(in srgb, var(--jungle) calc(100% - var(--rot)*1%), #2a2a2a) 0%,
        var(--jungle-deep) 100%);
    transition:background 1.2s ease;
  }
  /* ---- top bar ---- */
  #hud{
    display:flex;align-items:center;gap:10px;padding:12px 16px 8px;
    font-family:'Archivo';
  }
  #hud .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;opacity:.75;white-space:nowrap}
  #meter{flex:1;height:10px;border:1px solid rgba(239,231,210,.35);border-radius:99px;overflow:hidden;background:rgba(0,0,0,.25)}
  #meterfill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--blood));transition:width .8s ease}
  #poder{font-family:'Anton';font-size:15px;color:var(--gold);min-width:34px;text-align:right}
  /* ---- stage ---- */
  #stage{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:16px;overflow-y:auto}
  .scene-title{
    font-family:'Anton';text-transform:uppercase;color:var(--gold);
    font-size:13px;letter-spacing:.22em;margin-bottom:auto;padding-top:6px;opacity:.85
  }
  .speaker{font-family:'Anton';letter-spacing:.04em;font-size:13px;text-transform:uppercase;margin-bottom:4px;color:var(--bone)}
  .speaker.tiger{color:var(--gold)}
  .speaker.orange{color:var(--orange)}
  .speaker.narr{color:#9fb8a8;font-style:italic;font-family:'Archivo';font-weight:600;letter-spacing:.08em}
  /* ---- art panel ---- */
  #art{width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;margin-bottom:10px;
    border:1px solid rgba(239,231,210,.16);background:#06100b;position:relative;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  #art .art-layer{position:absolute;inset:0}
  #art .art-layer svg,#art .art-layer img{width:100%;height:100%;display:block;object-fit:cover}
  #art .art-portrait{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center}
  #art .art-portrait svg{width:auto;height:86%;object-fit:contain;filter:drop-shadow(0 3px 6px rgba(0,0,0,.45))}
  #art .art-portrait img{width:auto;height:92%;object-fit:contain}
  #say{
    font-size:19px;line-height:1.42;min-height:96px;
    background:rgba(6,16,11,.55);border:1px solid rgba(239,231,210,.14);
    border-left:3px solid var(--gold);border-radius:8px;padding:14px 16px;
    backdrop-filter:blur(2px);
  }
  #say.orange-box{border-left-color:var(--orange)}
  #say.narr-box{border-left-color:#5d7a68}
  /* ---- choices ---- */
  #choices{padding:10px 16px 18px;display:flex;flex-direction:column;gap:9px}
  button.choice{
    font-family:'Archivo';font-weight:600;font-size:16px;text-align:left;
    color:var(--bone);background:rgba(6,16,11,.6);
    border:1px solid rgba(239,231,210,.22);border-radius:8px;
    padding:14px 16px;cursor:pointer;transition:.15s;line-height:1.3;
  }
  button.choice:hover,button.choice:focus-visible{background:rgba(227,165,43,.16);border-color:var(--gold);outline:none}
  button.choice:active{transform:translateY(1px)}
  button.next{align-self:flex-end;background:var(--gold);color:var(--ink);border:none;font-family:'Anton';
    letter-spacing:.08em;padding:12px 26px;border-radius:99px;font-size:15px;cursor:pointer}
  button.next:active{transform:translateY(1px)}
  /* ---- minigame zones ---- */
  #zone{padding:6px 16px 12px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .crit{
    background:rgba(6,16,11,.6);border:1px solid rgba(239,231,210,.2);border-radius:9px;
    padding:11px;display:flex;flex-direction:column;gap:7px;cursor:pointer;transition:.15s;
  }
  .crit:active{transform:scale(.98)}
  .crit .nm{font-family:'Anton';font-size:14px;letter-spacing:.03em}
  .crit .st{font-size:12px;opacity:.8}
  .crit.poor{border-color:rgba(184,52,31,.5)}
  .crit.rich{border-color:rgba(227,165,43,.6)}
  .pips{display:flex;gap:3px;flex-wrap:wrap}
  .pip{width:13px;height:13px;border-radius:3px;background:var(--gold)}
  .pip.empty{background:rgba(255,255,255,.12)}
  .mini-hint{font-size:13px;opacity:.85;margin:8px 2px;line-height:1.4}
  /* tribunal */
  .dock{background:rgba(6,16,11,.65);border:1px solid rgba(239,231,210,.2);border-radius:9px;padding:16px;text-align:center}
  .dock .who{font-family:'Anton';font-size:22px;letter-spacing:.03em;margin-bottom:6px}
  .dock .desc{font-size:14px;opacity:.88;min-height:40px;line-height:1.4}
  .dock .count{font-size:11px;letter-spacing:.2em;text-transform:uppercase;opacity:.6;margin-bottom:10px}
  .verdict{display:flex;gap:9px;margin-top:14px}
  .verdict button{flex:1;font-family:'Anton';letter-spacing:.05em;font-size:14px;padding:13px;border-radius:8px;cursor:pointer;border:none}
  .v-cond{background:var(--blood);color:var(--bone)}
  .v-abs{background:rgba(239,231,210,.14);color:var(--bone);border:1px solid rgba(239,231,210,.3)!important}
  /* title / end */
  .center{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px}
  .center h1{font-family:'Anton';font-size:clamp(44px,16vw,86px);line-height:.9;letter-spacing:.02em;color:var(--gold);text-shadow:0 4px 0 rgba(0,0,0,.3)}
  .center .sub{margin:14px 0 4px;font-size:14px;letter-spacing:.28em;text-transform:uppercase;color:var(--orange)}
  .center .tag{font-size:14px;opacity:.8;max-width:300px;line-height:1.5;margin:18px 0 30px}
  .center button{font-family:'Anton';letter-spacing:.1em;background:var(--blood);color:var(--bone);border:none;
    padding:15px 40px;border-radius:99px;font-size:17px;cursor:pointer}
  .disclaimer{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:10px;opacity:.45;padding:0 24px;line-height:1.4}
  .fade{animation:fade .5s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <!-- screens injected by JS -->
</div>

<script>
"use strict";
/* ============================================================
   EL TIGRE — a satirical visual novel about a would-be king.
   The game's point of view condemns the tiger throughout.
   The Orange: no slang. A sycophantic propagandist who calls the
   Tiger "my best friend" and the man who'll make Colombia strong again.
   ============================================================ */

const app = document.getElementById('app');
let state = { poder:0, rot:0, debateTries:0, foodDone:false, condemned:0, absolved:0 };

/* ---------- helpers ---------- */
function setPoder(v){
  state.poder = Math.max(0, Math.min(100, v));
  state.rot = state.poder; // jungle rots as power grows
  document.documentElement.style.setProperty('--rot', state.rot);
}
function shell(){
  app.innerHTML = `
    <div id="hud">
      <span class="label">Poder</span>
      <div id="meter"><div id="meterfill"></div></div>
      <span id="poder">0</span>
    </div>
    <div id="stage"></div>
    <div id="zone"></div>
    <div id="choices"></div>`;
  refreshHud();
}
function refreshHud(){
  const f=document.getElementById('meterfill'), p=document.getElementById('poder');
  if(f){f.style.width=state.poder+'%'; p.textContent=state.poder;}
}
function say(speaker, cls, text, title){
  const stage=document.getElementById('stage');
  stage.innerHTML = `
    ${title?`<div class="scene-title">${title}</div>`:'<div class="scene-title">&nbsp;</div>'}
    <div class="fade">
      ${artPanel(speaker,title)}
      <div class="speaker ${cls}">${speaker}</div>
      <div id="say" class="${cls==='orange'?'orange-box':cls==='narr'?'narr-box':''}">${text}</div>
    </div>`;
  document.getElementById('zone').innerHTML='';
}
function choices(list){
  const c=document.getElementById('choices');
  c.innerHTML='';
  list.forEach(o=>{
    const b=document.createElement('button');
    b.className = o.next?'choice next':'choice';
    b.textContent=o.t;
    b.onclick=o.fn;
    c.appendChild(b);
  });
}
function nextBtn(fn,label='Continue'){
  choices([{t:label,next:true,fn}]);
}

/* ============================================================

   Characters: tiger, orange, woman, figure

function bgKeyFromTitle(title){
  if(!title) return 'intro';
  if(/Coronation/i.test(title)) return 'crown';
  const m = title.match(/(\d{2})/);
  return m ? m[1] : 'intro';
}
function portraitKey(speaker){
  const s=(speaker||'').toUpperCase();
  if(s.includes('TIGER')||s.includes('TIGRE')) return 'tiger';
  if(s.includes('ORANGE')) return 'orange';
  if(s.includes('WOMAN')) return 'woman';
  if(s.includes('ELDER')||s.includes('STRANGER')||s.includes('QUOTA')) return 'figure';
  return null;
}
function artPanel(speaker,title){
  const bk = bgKeyFromTitle(title);
  const bgSlot = 'bg_'+bk;
  const bg = ART[bgSlot] ? `<img src="${ART[bgSlot]}" alt="">` : (SCENE[bk]||SCENE.intro);
  const pk = portraitKey(speaker);
  let portrait='';
  if(pk){
    const p = ART[pk] ? `<img src="${ART[pk]}" alt="">` : SPRITE[pk];
    portrait = `<div class="art-portrait">${p}</div>`;
  }
  return `<div id="art"><div class="art-layer">${bg}</div>${portrait}</div>`;
}

function setQuota(n){
  state.quota=n;
  if(n<9){
    say('NARRATOR','narr',
      `Too few, parcero. The ones left alive talk, then they organize, then they march. By the next moon the reds run the whole selva and the Tigre is a footnote. ¡Qué hijuemadre cagada!`,'06 · The Tribunal');
    nextBtn(()=>gameOver(

    say('NARRATOR','narr',
      `The number is ${n}. The generals nod. They haul the suspects in one by one, en desorden — you never know who's next. Release more than ${10-n}, and you miss your number, parce. Miss your number, and the reds win.`,'06 · The Tribunal');
    nextBtn(()=>{ state.order = shuffle(suspects.slice()); runTribunal(0); });
  }
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function runTribunal(i){
  if(i>=state.order.length) return tribunalResolve();
  const s=state.order[i];
  const allowed = 10 - state.quota;
  say('THE QUOTA','',`&nbsp;`,'06 · The Tribunal · Quota '+state.quota);
  document.getElementById('zone').innerHTML = `
    <div class="dock fade">
      <div class="count">Suspect ${i+1} of 10 · Demanded: ${state.quota} · Released so far: ${state.absolved}/${allowed}</div>
      <div class="who">${s.nm}</div>
      <div class="desc">${s.d}</div>
      <div class="verdict">
        <button class="v-cond" id="cond">Handle it</button>
        <button class="v-abs" id="abs">Let go</button>
      </div>
    </div>`;
  document.getElementById('choices').innerHTML='';
  document.getElementById('cond').onclick=()=>{ state.condemned++; setPoder(state.poder+2); refreshHud(); runTribunal(i+1); };
  document.getElementById('abs').onclick=()=>{
    state.absolved++;
    if(state.absolved > allowed){ return tribunalFail(); }
    runTribunal(i+1);
  };
}
function tribunalFail(){
  say('NARRATOR','narr',
    `Too many walked free, güevón. They find each other, they find the others, and the marcha begins. The number went unfilled, the reds took the selva, and the Tigre's crown was never minted. ¡Se la comieron toda!`,'06 · The Tribunal');
  nextBtn(()=>gameOver(
    'THE LEFT WINS',
    'You let too many go. Your quota collapsed and the movement you feared swept in. The machine had one rule — fill the number — and you broke it.',
    st6_tribunal));
}
function tribunalResolve(){
  say('ORANGE','orange',
    `The number is met, my best friend. Every file reads "combatant killed in action." Nobody can touch you. This is what a strong Colombia looks like.`,'06 · The Tribunal');
  nextBtn(madres);
}
function madres(){
  setPoder(state.poder+10); refreshHud();
  say('NARRATOR','narr',
    `Meses después, the mothers come. They stand in a line clutching photographs, asking where their muchachos went. The faces on the photos are the ones from the feeding game — Coneja Rosa, Pulga, Tío Mono. They were never fighters, parce. They were a number that needed filling.`,'06 · The Tribunal');
  nextBtn(()=>{
    say('NARRATOR','narr',
      `He never said the word "kill," ¿oíste? He only set a number and looked away. That was always enough.`,'06 · The Tribunal');
    nextBtn(st7_pregnancy);
  });
}

/* ---------- STATION 7: THE DECREE ---------- */
function st7_pregnancy(){
  say('NARRATOR','narr',
    `Three months later, parce. The hembra from the courtroom comes back — alone, and visibly pregnant. She asks the king for the right to decide what happens next.`,'07 · The Decree');
  nextBtn(()=>{
    say('THE TIGER','tiger',
      `"Espérate — you're the little seductora from my court, from three months ago. I remember you, mija." He eyes her swollen belly and smiles. "And now I decide, not you."`,'07 · The Decree');
    nextBtn(()=>{
      say('NARRATOR','narr',
        `He recognizes her, blames her for what was done to her — and reaches for the one decision that was hers, el muy descarado.`,'07 · The Decree');
      choices([
        {t:'Decree it: she carries it and keeps the child',fn:st7_force},
        {t:'Let her make her own choice',fn:st7_mercy}
      ]);
    });
  });
}
function st7_force(){
  setPoder(state.poder+5); refreshHud();
  say('THE TIGER','tiger',
    `"You'll carry it. You'll keep it. A king decides these things now."`,'07 · The Decree');
  nextBtn(()=>{
    say('NARRATOR','narr',
      `He seizes her body and her future in one sentence. It is never said aloud whose child it is. It does not need to be.`,'07 · The Decree');
    nextBtn(coronation);
  });
}
function st7_mercy(){
  say('ORANGE','orange',
    `No — a strong leader never shows weakness, my best friend. If you will not even rule one woman's body, you will rule nothing. Colombia needs an iron hand, not a soft one.`,'07 · The Decree');
  nextBtn(()=>{
    say('NARRATOR','narr',
      `He lets her walk out, her choice her own. The Orange's smile curdles. By morning the generals have found a harder, crueler cat to crown in his place. The machine he served only ever rewarded cruelty — and it discards anything less.`,'07 · The Decree');
    nextBtn(()=>gameOver(
      'DETHRONED BEFORE THE CROWN',
      'You let go of a single cruelty. The system that built you has no use for restraint — it throws you out and finds someone worse.',
      st7_pregnancy));
  });
}

/* ---------- CORONATION ---------- */
function coronation(){
  setPoder(100); refreshHud();
  document.getElementById('zone').innerHTML='';
  say('NARRATOR','narr',
    `So the Tigre is crowned. King of the selva, exactly like he wanted, hermano.`,'The Coronation');
  nextBtn(()=>{
    say('NARRATOR','narr',
      `The jungle's grey and poisoned, the gold sits under dead earth, the pueblos are empty or out for blood. There's no crowd at the coronation, parce. Just the Orange, cheering — the last loyal subject of a kingdom of one.`,'The Coronation');
    nextBtn(()=>{
      say('ORANGE','orange',
        `THE KING! My best friend — the king! …It is a little quiet, isn't it? Where did everyone go? …No matter. We made Colombia strong again. We won everything.`,'The Coronation');
      nextBtn(()=>{
        say('NARRATOR','narr',
          `Far from the dead throne, in the ruins he made, the child is born — the daughter he forced into the world. She grows up in the wreckage, carrying his name and her mother's spine. One day she will walk back to this jungle and pull the crown down with her own hands. He built his successor, and called it victory.`,'The Coronation');
        nextBtn(()=>{
          app.innerHTML=`
            <div class="center fade">
              <div class="sub" style="color:var(--blood)">End of Part One</div>
              <h1 style="font-size:clamp(34px,11vw,60px)">THE CROWN<br>IS THE<br>PUNISHMENT</h1>
              <div class="tag">He got everything he campaigned for — and seeded his own downfall. The daughter's reckoning is the sequel.</div>
              <button id="again">Play again</button>
              <div class="disclaimer">Satire. Any resemblance to real campaigns is the point you are meant to draw yourself.</div>
            </div>`;
          document.getElementById('again').onclick=()=>{ state={poder:0,rot:0,debateTries:0,foodDone:false,condemned:0,absolved:0}; renderFood.carry=0; setPoder(0); titleScreen(); };
        });
      });
    });
  });
}

function gameOver(title, body, retryFn){
  app.innerHTML=`
    <div class="center fade">
      <div class="sub" style="color:var(--blood)">Game Over</div>
      <h1 style="font-size:clamp(30px,10vw,52px)">${title}</h1>
      <div class="tag">${body}</div>
      <button id="retry">Try again</button>
    </div>`;
  document.getElementById('retry').onclick=()=>{ shell(); retryFn(); };
}

/* boot */
setPoder(0);
titleScreen();
</script>
</body>
</html>
